name: Firebase Live Deploy

"on":
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: firebase-live
  cancel-in-progress: true

jobs:
  build_and_deploy_live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BOOTSTRAP_ADMIN_UID: ${{ secrets.VITE_BOOTSTRAP_ADMIN_UID }}
          VITE_MASTER_ADMIN_UID: ${{ secrets.VITE_MASTER_ADMIN_UID }}
          VITE_GOOGLE_AI_KEY: ${{ secrets.VITE_GOOGLE_AI_KEY }}
          VITE_DB_PATH_PLANNING: ${{ secrets.VITE_DB_PATH_PLANNING }}

      - name: Deploy Firebase Hosting + Functions (live)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FUTURE_FACTORY_377EF }}' > "$HOME/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-service-account.json"
          npx firebase-tools deploy --project future-factory-377ef --only hosting,functions --non-interactive
