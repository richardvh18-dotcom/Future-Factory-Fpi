<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA & Mobile Settings -->
    <script>
      (function attachManifest() {
        var host = String(window.location.hostname || "");
        if (host.endsWith("app.github.dev")) return;
        var link = document.createElement("link");
        link.rel = "manifest";
        link.href = "/manifest.json?v=4";
        document.head.appendChild(link);
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FPi Factory" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#0f172a" />

    <title>FPi Future Factory | MES Portal</title>

    <!-- Android PWA Optimalisaties -->
    <style>
      html, body {
        overscroll-behavior-y: none; /* Voorkom pull-to-refresh bij naar beneden vegen */
        touch-action: pan-x pan-y; /* Voorkom double-tap to zoom vertraging */
        -webkit-tap-highlight-color: transparent; /* Verwijder blauwe flikkering bij het aantikken */
      }
      /* Voorkom ongewenste tekstselectie op knoppen tijdens het scannen/tikken */
      button, a, .no-select, [role="button"] {
        user-select: none;
        -webkit-user-select: none;
      }
      /* Zorg dat tekstinvoervelden wel normaal werken */
      input, textarea {
        user-select: auto;
        -webkit-user-select: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
