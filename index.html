<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <!-- Belangrijk voor mobiele apparaten en tablets op de werkvloer -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="FPi Future Factory - Digital Planning & MES"
    />


    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FPi Factory" />
    <title>FPi Future Factory | MES Portal</title>


    <!-- Externe scanner bibliotheek voor QR-codes op stations -->
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>

    <style>
      /* Voorkomt flikkering tijdens het laden van de React app */
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <!-- Foutmelding voor gebruikers met uitgeschakelde JavaScript -->
    <noscript
      >U moet JavaScript inschakelen om deze applicatie te kunnen
      gebruiken.</noscript
    >

    <!-- Hier wordt de volledige React applicatie in geladen -->
    <div id="root"></div>

    <!-- De koppeling naar de broncode in de src map -->
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function(err) {
            console.log('ServiceWorker registratie faalde: ', err);
          });
        });
      }
    </script>
  </body>
</html>
